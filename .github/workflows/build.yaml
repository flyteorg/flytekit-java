name: flytekit-java build

on:
  push:
    branches:  [master]
  pull_request:


jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-prepare-release-${{ hashFiles('pom.xml') }}

      - name: Setup JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: 11.0
          distribution: 'adopt'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.SONATYPE_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Log in to Docker Hub
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.FLYTE_BOT_USERNAME }}
          password: ${{ secrets.FLYTE_BOT_PAT }}

      - name: Debug flyte-sandbox-bundled container
        if: ${{ github.ref != 'refs/heads/master' }}
        run: |
          set -x
          echo "=== Docker info ==="
          docker info
          echo "=== Pulling image ==="
          docker pull ghcr.io/flyteorg/flyte-sandbox-bundled:sha-f3ab1b7480bad4072f7ecb695660fdf47032a6c4
          echo "=== Starting container ==="
          echo "=== Test 1: with --cgroupns=host ==="
          docker run --privileged --cgroupns=host --tmpfs /run --tmpfs /var/run \
            --name flyte-sandbox-debug -d \
            ghcr.io/flyteorg/flyte-sandbox-bundled:sha-f3ab1b7480bad4072f7ecb695660fdf47032a6c4
          echo "=== Waiting 120s for container ==="
          for i in $(seq 1 12); do
            sleep 10
            STATUS=$(docker inspect flyte-sandbox-debug --format '{{.State.Status}}' 2>/dev/null || echo "gone")
            echo "[$((i*10))s] Container status: $STATUS"
            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "gone" ]; then
              echo "=== Container exited early ==="
              docker inspect flyte-sandbox-debug 2>/dev/null || true
              break
            fi
          done
          echo "=== Container logs (stdout) ==="
          docker logs flyte-sandbox-debug 2>/dev/null | tail -100 || true
          echo "=== Container logs (stderr) ==="
          docker logs flyte-sandbox-debug 2>&1 >/dev/null | tail -100 || true
          echo "=== Entrypoint log ==="
          docker exec flyte-sandbox-debug cat /var/log/k3d-entrypoints*.log 2>/dev/null || echo "no entrypoint log"
          echo "=== k3s process ==="
          docker exec flyte-sandbox-debug ps aux 2>/dev/null || echo "cannot exec"
          echo "=== kubectl get pods ==="
          docker exec flyte-sandbox-debug kubectl get pods -A 2>/dev/null || echo "kubectl failed"
          echo "=== Healthcheck ==="
          docker exec flyte-sandbox-debug wget -qO- http://localhost:30080/healthcheck 2>/dev/null || echo "healthcheck failed"
          echo "=== Cleanup ==="
          docker stop flyte-sandbox-debug 2>/dev/null || true
          docker rm flyte-sandbox-debug 2>/dev/null || true

      - name: Verify with Maven
        if: ${{ github.ref != 'refs/heads/master' }}
        run: mvn --batch-mode verify -Pci

      - name: Release snapshot with Maven
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          export GPG_TTY=$(tty)
          export DISPLAY=:0
          gpg --version
          gpg --list-secret-keys --keyid-format LONG
          echo "test" | gpg --batch --clearsign --pinentry-mode loopback || true

          echo ">>>>>>>>>>>>>>>>>>>>>>>>>>>>"
          mvn --batch-mode deploy -Pci
        env:
          CI: true
          MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.SONATYPE_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
